name: Deploy app to Pages

# Builds the in-browser migration console (app/) and publishes it to GitHub
# Pages at https://sgtpooki.github.io/ipfs2foc/. Enable once in repo Settings →
# Pages → Source: GitHub Actions.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/car-url.ts'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
