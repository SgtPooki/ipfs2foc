name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Opens/updates the release PR, and on merge cuts a GitHub release + tag.
      # Versioning stays pre-1.0: bump-minor-pre-major in release-please-config.json
      # bumps the minor on breaking changes instead of the major.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing; provenance is automatic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing needs npm >= 11.5.1; upgrade regardless of what ships.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # No NPM_TOKEN. Authenticates via OIDC against the Trusted Publisher
      # configured on npmjs.com for this repo + workflow. Provenance is automatic.
      # Requires a one-time manual publish to create the package first
      # (OIDC cannot publish a package's initial version).
      - run: npm publish --access public
