name: release-please

on:
  push:
    branches: [main]
  # Manual escape hatch: publish the current packages/cli version when the
  # automatic publish was missed (e.g. a release was tagged but its publish job
  # did not run). Runs the publish job regardless of release_created.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Manifest mode: the action emits `releases_created` (aggregate) and
      # `<path>--*` outputs, NOT the singular `release_created` of single-package
      # mode. Gating on the wrong name silently skips publish (it did for 0.2.0).
      release_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
    steps:
      # Opens/updates the release PR, and on merge cuts a GitHub release + tag.
      # Versioning stays pre-1.0: bump-minor-pre-major in release-please-config.json
      # bumps the minor on breaking changes instead of the major.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing; provenance is automatic
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      # Install, verify, and build with pnpm (the repo's package manager).
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      # Publish with npm: its OIDC trusted publishing authenticates against the
      # Trusted Publisher configured on npmjs.com for this repo + workflow, so no
      # NPM_TOKEN is needed and provenance is automatic. Trusted publishing needs
      # npm >= 11.5.1. --ignore-scripts skips the prepack rebuild (dist is built
      # above). The package's initial version had to be published manually once;
      # OIDC cannot publish a package that does not yet exist.
      - run: npm install -g npm@latest
      - run: npm publish --access public --ignore-scripts
        working-directory: packages/cli
